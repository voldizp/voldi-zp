  <div id="lv" style="display:none"></div>
  <div id="zv" style="display:none"></div>

         ondragover="event.preventDefault();this.style.borderColor='var(--ac)'"
         ondragleave="this.style.borderColor='var(--bd2)'"
         ondrop="handleDropAll(event)">
      <input type="file" id="allFilesInput" accept=".xlsx" multiple style="display:none" onchange="handleFilesAll(this.files)">

      <div style="font-size:12px;color:var(--tx3);margin-top:.4rem">або натисніть щоб вибрати</div>
      <div style="font-size:11px;color:var(--tx3);margin-top:.5rem">дані.xlsx · табель · стаж · премія_за_друга</div>
    </div>

    </div>

      <button class="btn-import" id="importBtn" onclick="doImport()" disabled>Розрахувати</button>

  </div>
</div>

    b.style.background = loc===l ? '#fff' : 'transparent';

function buildMonthSelector() {
  const sel = document.getElementById('monthSel');
  sel.innerHTML = '';
  const months = Object.keys(HISTORY).sort().reverse();
  months.forEach(k => {
    const o = document.createElement('option');
    o.value = k;
    o.textContent = HISTORY[k].label;
    sel.appendChild(o);
  });
  sel.value = currentMonth;
  sel.onchange = () => setMonth(sel.value);
}

  zvShowing = false;
  $('btnZvedena').classList.remove('active');
  $('zv').style.display='none';

  $('empty').style.display='none';
}

function setMonth(key) {
  currentMonth = key;
  closeAll();
  currentData = HISTORY[key] ? HISTORY[key].employees : [];
  document.getElementById('monthSel').value = key;

  document.getElementById('si').value = '';

siEl.addEventListener('keydown', e => {
  const items = dropEl.querySelectorAll('.di');
  if (e.key === 'ArrowDown') { e.preventDefault(); selIdx = Math.min(selIdx+1, items.length-1); items.forEach((el,i) => el.classList.toggle('sel', i===selIdx)); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); selIdx = Math.max(selIdx-1, 0); items.forEach((el,i) => el.classList.toggle('sel', i===selIdx)); }
  else if (e.key === 'Enter') { if (selIdx>=0&&filtered[selIdx]) showCard(filtered[selIdx]); else if (filtered[0]) showCard(filtered[0]); }
  else if (e.key === 'Escape') hideDrop();
});

dropEl.addEventListener('click', e => {
  const di = e.target.closest('.di');
  if (!di) return;
  const emp = filtered[+di.dataset.i];

});

function showDrop(q) {
  if (!q) { hideDrop(); return; }
  filtered = currentData.filter(e => e.name.toLowerCase().includes(q.toLowerCase())).slice(0, 10);
  if (!filtered.length) { hideDrop(); return; }
  dropEl.innerHTML = filtered.map((e, i) =>
    '<div class="di" data-i="'+i+'"><div class="lav" style="width:28px;height:28px;font-size:11px">'+ini(e.name)+'</div>'
    +'<div style="flex:1;min-width:0"><div style="font-weight:600">'+hi(e.name,q)+'</div>'
    +'<div style="font-size:11px;color:var(--tx2)">'+e.posada+'</div></div>'
    +'<div style="font-size:11px;color:var(--tx3)">'+e.dept+'</div></div>'
  ).join('');
  dropEl.classList.add('open');
  selIdx = -1;
}

  // Click row → open card

function r(lbl, val, cls, tag) {
  if (!val && val !== 0) return '';
  return '<div class="row"><span class="rl">'+lbl+(tag||'')+'</span><span class="rv '+(cls||'')+'">'+val+'</span></div>';
}

function showCard(e) {

  doShowCard(e);
}

  if (e.nochni > 0) det += r('Нічні / святкові / вихідні', fmt(e.nochni), 'pos');

    e.dopList.forEach(function(d) {

    +'</div>';

    '05':'2026-05','06':'2026-06','07':'2026-07','08':'2026-08',
    '09':'2026-09','10':'2026-10','11':'2026-11','12':'2026-12',
    'січ':'2026-01','лют':'2026-02','бер':'2026-03','кві':'2026-04',
    'тра':'2026-05','чер':'2026-06','лип':'2026-07','сер':'2026-08',
    'вер':'2026-09','жов':'2026-10','лис':'2026-11','гру':'2026-12',
  };
  // Check for _MM_ or _MM. patterns (e.g. _03_, дані_03.xlsx)
  const numMatch = n.match(/[_\-\s](\d{2})[_\-\.\s]/);
  if (numMatch && monthMap[numMatch[1]]) return monthMap[numMatch[1]];
  // Check for month name
  for (const [key, val] of Object.entries(monthMap)) {
    if (key.length > 2 && n.includes(key)) return val;
  }
  return null;
}

function detectFileType(fn) {
  const n = fn.toLowerCase();
  if (n.includes('стаж') || n.includes('stazh')) return 'stazh';
  if (n.includes('друг') || n.includes('drug')) return 'drug';
  if (n.includes('табел') || n.includes('tabel')) return 'tab';
  return 'dany';
}
const TYPE_LABELS = {
  dany:  { icon: '📊', label: 'Дані (Ф1, премії, тонаж)' },
  tab:   { icon: '📅', label: 'Табель' },
  stazh: { icon: '📋', label: 'Стаж' },
  drug:  { icon: '🤝', label: 'Премія за друга' },
};
function handleDropAll(e) {
  e.preventDefault();
  const zone = document.getElementById('dropAllZone');
  if (zone) { zone.style.borderColor='var(--bd2)'; zone.style.background='var(--sf2)'; }
  handleFilesAll(e.dataTransfer.files);
}
function handleFilesAll(files) {
  Array.from(files).forEach(function(f) { loadFileAs(detectFileType(f.name), f); });
}
function removeFile(type) {
  fileData[type] = null;
  updateFilesList();
  if (!fileData.dany || !fileData.tab) $('importBtn').disabled = true;
}
function loadFileAs(type, file) {
  // Try to detect month from filename
  const detectedM = detectMonth(file.name);
  if (detectedM) fileData._detectedMonth = detectedM;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      fileData[type] = XLSX.read(new Uint8Array(ev.target.result), {type:'array'});
      updateFilesList();
      if (fileData.dany && fileData.tab) $('importBtn').disabled = false;
    } catch(err) { showToast('Помилка: ' + file.name, 'err'); }
  };
  reader.readAsArrayBuffer(file);
}
function updateFilesList() {
  const inner = $('filesListInner'), list = $('filesList');
  if (!inner || !list) return;
  const loaded = Object.entries(fileData).filter(function(kv) { return kv[1]; });
  if (!loaded.length) { list.style.display='none'; return; }
  list.style.display = '';
  // Auto-detect month from loaded file names
  const monthInp = $('monthInput');
  if (monthInp && fileData._detectedMonth) {
    monthInp.value = fileData._detectedMonth;
  }
  inner.innerHTML = loaded.filter(function(kv) {
    return kv[0] !== '_detectedMonth';
  }).map(function(kv) {
    const t = kv[0];
    const info = TYPE_LABELS[t] || {icon:'📄', label:t};
    return '<div style="display:flex;align-items:center;gap:.5rem;padding:5px 0;border-bottom:1px solid var(--bd);font-size:13px">'
      + '<span>' + info.icon + '</span>'
      + '<span style="font-weight:600">' + info.label + '</span>'
      + '<span style="color:var(--gn);margin-left:auto">✓</span>'
      + '<button onclick="removeFile(\'' + t + '\')" style="border:none;background:none;color:var(--tx3);cursor:pointer;padding:0 4px;font-size:14px">✕</button>'
      + '</div>';
  }).join('');
}
function processFile(type, file) { loadFileAs(type, file); }
function handleFile(type, input) { if (input.files[0]) loadFileAs(type, input.files[0]); }

function processFile(type, file) {
  const nameEl = $(type+'Name'), statusEl = $(type+'Status');
  if (nameEl) nameEl.textContent = file.name;
  if (statusEl) { statusEl.textContent = 'Зчитування...'; statusEl.className = 'file-status'; }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
      fileData[type] = wb;
      if (statusEl) { statusEl.textContent = '✓ Завантажено'; statusEl.className = 'file-status ok'; }
      // Enable button if required files present
      if (fileData.dany && fileData.tab) $('importBtn').disabled = false;
    } catch(err) {
      if (statusEl) { statusEl.textContent = '✗ Помилка: '+err.message; statusEl.className = 'file-status err'; }
    }
  };
  reader.readAsArrayBuffer(file);
}

function gc(ws, row, col) {
  const cell = ws[XLSX.utils.encode_cell({r:row, c:col})];
  return cell ? cell.v : null;
}
function sfv(v) { if(v===null||v===undefined||v==='') return 0; const f=parseFloat(v); return isNaN(f)?0:Math.round(f*100)/100; }
function cleanName(s) { if(!s) return ''; return String(s).split(',')[0].trim().replace(/'/g,'\u2019'); }
function normName(s) {
  return s
    .replace(/\s*\([^)]*\)\s*/g, ' ')
    .replace(/[\u2019\u2018\u0060\u00b4']/g, "'")
    .replace(/\s+/g, ' ')
    .trim()
    .toLowerCase();
}
// Normalize similar-looking Cyrillic letters (common typos: Ш/Щ, І/И/Й)
function normNameFuzzy(s) {
  return normName(s)
    .replace(/щ/g, 'ш')   // Щатковська → Шатковська
    .replace(/ї/g, 'і')
    .replace(/й/g, 'и');
}
function matchName(name, map) {
  if (!name) return null;
  // 1. Exact match
  if (map[name]) return map[name];
  // 2. Normalized match (ignore suffixes)
  const normN = normName(name);
  for (const k of Object.keys(map)) {
    if (normName(k) === normN) return map[k];
  }
  // 3. Partial match
  for (const k of Object.keys(map)) {
    if (k.includes(name) || name.includes(k)) return map[k];
    if (normName(k).includes(normN) || normN.includes(normName(k))) return map[k];
  }
  // 4. Fuzzy match (Ш/Щ etc)
  const fuzzyN = normNameFuzzy(name);
  for (const k of Object.keys(map)) {
    if (normNameFuzzy(k) === fuzzyN) return map[k];
  }
  return null;
}

function doImport() {
  if (!fileData.dany || !fileData.tab) return;
  const monthKey = $('monthInput').value;
  if (!monthKey) { showToast('Оберіть місяць', 'err'); return; }

  const fill = $('progressFill'), txt = $('progressText');
  $('progress').style.display = 'block';
  $('importBtn').disabled = true;

  // === STEP 1: Parse Ф1 (нараховано) ===
  txt.textContent = 'Читаємо Ф1...'; fill.style.width = '10%';
  const f1Map = {}; // name -> f1 amount
  const wsF1 = fileData.dany.Sheets['нараховано'];
  if (wsF1) {
    const range = XLSX.utils.decode_range(wsF1['!ref']);
    for (let r = 0; r <= range.e.r; r++) {
      const name = cleanName(gc(wsF1, r, 0));
      const amt = sfv(gc(wsF1, r, 1));
      if (name && name.length > 3 && amt > 0) f1Map[name] = amt;
    }
  }

  // === STEP 2: Parse премії та доплати ===
  txt.textContent = 'Читаємо премії...'; fill.style.width = '20%';
  const doplatyMap = {}; // name -> [{amt, desc}]
  const wsDop = fileData.dany.Sheets['премії та доплати'];
  if (wsDop) {
    const range = XLSX.utils.decode_range(wsDop['!ref']);
    for (let r = 0; r <= range.e.r; r++) {
      // Try col0 first (April format), then col1 (March format)
      const rawName0 = gc(wsDop, r, 0);
      const rawName1 = gc(wsDop, r, 1);
      const nameRawDop = (rawName0 && String(rawName0).trim().length > 3) ? rawName0 : rawName1;
      const name = cleanName(nameRawDop);
      // Amount: try col1 (if name was col0), else col4
      let amt, desc;
      if (rawName0 && String(rawName0).trim().length > 3) {
        // April format: col0=name, col1=amt, col2=desc
        amt = sfv(gc(wsDop, r, 1));
        desc = String(gc(wsDop, r, 2) || '');
      } else {
        // New March format: col1=name, col2=amt, col3=desc
        // Old March format: col1=name, col4=amt, col5=desc
        const amt2 = sfv(gc(wsDop, r, 2));
        const amt4 = sfv(gc(wsDop, r, 4));
        if (amt2 !== 0) {
          amt = amt2;
          desc = String(gc(wsDop, r, 3) || '');
        } else {
          amt = amt4;
          desc = String(gc(wsDop, r, 5) || '');
        }
      }
      if (name && name.length > 3 && amt !== 0) {
        if (!doplatyMap[name]) doplatyMap[name] = [];
        doplatyMap[name].push({amt, desc});
      }
    }
  }

  // === STEP 2a: Parse Левицька (доплати по окремому аркушу) ===
  const levytskaMap = {}; // додаткові доплати для Левицької
  const levSheetName = fileData.dany.SheetNames.find(s => s.toLowerCase() === 'левицька');
  const wsLev = levSheetName ? fileData.dany.Sheets[levSheetName] : null;
  if (wsLev) {
    const range = XLSX.utils.decode_range(wsLev['!ref']);
    let levTotal = 0;
    for (let r = 0; r <= range.e.r; r++) {
      const lbl = String(gc(wsLev,r,1)||gc(wsLev,r,0)||'').toLowerCase();
      if (lbl.includes('сум') || lbl.includes('разом') || lbl.includes('коментар')) continue;
      const amt = sfv(gc(wsLev,r,1));
      if (amt !== 0) levTotal += amt;
    }
    if (levTotal !== 0) levytskaMap['Левицька'] = levTotal;
  }

  // === STEP 2b: Parse поворотні премії ===
  txt.textContent = 'Читаємо поворотні премії...'; fill.style.width = '22%';
  const povorMap = {}; // name -> amt
  // Find поворотні премії sheet (case-insensitive)
  const povSheetName = fileData.dany.SheetNames.find(s => s.toLowerCase().includes('поворот'));
  const wsPov = povSheetName ? fileData.dany.Sheets[povSheetName] : null;
  if (wsPov) {
    const range = XLSX.utils.decode_range(wsPov['!ref']);
    for (let r = 0; r <= range.e.r; r++) {
      // col1=name, col2=amt
      const nameRaw = gc(wsPov, r, 1);
      const name = cleanName(nameRaw);
      if (!name || name.length < 3) continue;
      const amt = sfv(gc(wsPov, r, 2));
      if (amt > 0) povorMap[name] = (povorMap[name]||0) + amt;
    }
  }

  // === STEP 3: Parse відпускні ===
  txt.textContent = 'Читаємо відпускні...'; fill.style.width = '25%';
  const vidpuskMap = {};  // name -> vidpusk amt
  const likarFssMap = {}; // name -> likar_fss amt
  const wsVidp = fileData.dany.Sheets['відпускні'];
  if (wsVidp) {
    const range = XLSX.utils.decode_range(wsVidp['!ref']);
    for (let r = 0; r <= range.e.r; r++) {
      // Try col0 (April format: name in col0) or col1 (March format: name in col1)
      const rawN0 = gc(wsVidp, r, 0);
      const rawN1 = gc(wsVidp, r, 1);
      const nameRaw = (rawN0 && String(rawN0).trim().length > 3) ? rawN0 : rawN1;
      const name = cleanName(nameRaw);
      if (!name || name.length < 3) continue;
      if (rawN0 && String(rawN0).trim().length > 3) {
        // April format: col0=name, col1=vidpusk
        const amt = sfv(gc(wsVidp, r, 1));
        if (amt > 0) vidpuskMap[name] = (vidpuskMap[name]||0) + amt;
      } else {
        // March format: col1=name, col2=відпускні, col3=лікарняні ФСС
        const vidp = sfv(gc(wsVidp, r, 2));
        const likar = sfv(gc(wsVidp, r, 3));
        if (vidp > 0) vidpuskMap[name] = (vidpuskMap[name]||0) + vidp;
        if (likar > 0) likarFssMap[name] = (likarFssMap[name]||0) + likar;
      }
    }
  }

  // === STEP 4: Parse тонаж (план/факт для цеху цукерок) ===
  txt.textContent = 'Читаємо тонаж...'; fill.style.width = '30%';
  let tPlan = 0, tFakt = 0, tPct = 0;
  let vPlan=0, vFakt=0, vZagalna=0, vKryhta=0, vPctCila=0, lvivSales=0;
  const wsTonn = fileData.dany.Sheets['тонаж'];
  if (wsTonn) {
    const range = XLSX.utils.decode_range(wsTonn['!ref']);
    for (let r = 0; r <= range.e.r; r++) {
      const b = String(gc(wsTonn,r,1)||'').toLowerCase();
      if (b.includes('план') || b.includes('ваф') || b.includes('пот') || b.includes('к') && b.length<5) continue;
      const p = sfv(gc(wsTonn,r,1)), f = sfv(gc(wsTonn,r,2));
      if (p > 0 && f >= 0) {
        if (tPlan === 0) { tPlan=p; tFakt=f; tPct=p>0?f/p:0; }
        else if (vPlan === 0) {
          vPlan=p; vFakt=f;
          vZagalna=sfv(gc(wsTonn,r,4)); vKryhta=sfv(gc(wsTonn,r,5));
          vPctCila = vZagalna>0 ? (vZagalna-vKryhta)/vZagalna*100 : sfv(gc(wsTonn,r,6));
        }
      }
    }
  }

  // === STEP 5: Parse керівники цехів ===
  txt.textContent = 'Читаємо премії керівників...'; fill.style.width = '35%';
  const kerivMap = {}; // name -> {plan_t, fakt_t, pct_plan, prem_tonazh, prem_plan}
  const wsKer = fileData.dany.Sheets['керівники цехів'];
  if (wsKer) {
    const range = XLSX.utils.decode_range(wsKer['!ref']);
    for (let r = 0; r <= range.e.r; r++) {
      const name = cleanName(gc(wsKer, r, 3));
      if (!name || name.length < 3) continue;
      const num = sfv(gc(wsKer, r, 0));
      if (num < 1) continue;
      const plan_t = sfv(gc(wsKer, r, 4));
      const fakt_t = sfv(gc(wsKer, r, 5));
      const pct_plan = sfv(gc(wsKer, r, 6));
      // Find премія до виплати for тонаж (col 13) and план (col 17)
      // Structure: cols 7-13 = tonazh tiers + result, cols 14-17 = plan tiers + result
      const prem_tonazh = sfv(gc(wsKer, r, 14));
      const prem_plan = sfv(gc(wsKer, r, 18));
      kerivMap[name] = {plan_t, fakt_t, pct_plan, prem_tonazh, prem_plan};
    }
  }

  // === STEP 5b: Parse охорона премії ===
  txt.textContent = 'Читаємо премії охорони...'; fill.style.width = '38%';
  const okhorMap = {};
  const okhoraSheetName = fileData.dany.SheetNames.find(s => s.toLowerCase() === 'охорона');
  const wsOkh = okhoraSheetName ? fileData.dany.Sheets[okhoraSheetName] : null;
  if (wsOkh) {
    const range = XLSX.utils.decode_range(wsOkh['!ref']);
    for (let r = 0; r <= range.e.r; r++) {
      const name = cleanName(gc(wsOkh, r, 1));
      if (!name || name.length < 3) continue;
      const isGychka = name.includes('Гичка');
      const alkohol = sfv(gc(wsOkh, r, 3));
      const vyiavl  = sfv(gc(wsOkh, r, 6));
      const prem_norma  = (alkohol === 0) ? (isGychka ? 1000 : 500) : 0;
      const prem_vyyavl = (vyiavl  >  0) ? (isGychka ?  500 : 300) : 0;
      okhorMap[name] = {prem_norma, prem_vyyavl};
    }
  }

  // ===  // === STEP 6: Parse стаж ===
  txt.textContent = 'Читаємо стаж...'; fill.style.width = '40%';
  const stazhMap = {};
  if (fileData.stazh) {
    const wsS = fileData.stazh.Sheets[fileData.stazh.SheetNames[0]];
    if (wsS) {
      const range = XLSX.utils.decode_range(wsS['!ref']);
      for (let r = 0; r <= range.e.r; r++) {
        const name = cleanName(gc(wsS, r, 0));
        const years = sfv(gc(wsS, r, 2));
        if (name && name.length > 3 && years < 100) stazhMap[name] = years;
      }
    }
  }

  // === STEP 7: Parse премія за друга ===
  txt.textContent = 'Читаємо премію за друга...'; fill.style.width = '45%';
  const drugMap = {}; // name -> amt (1000)
  const [mYear, mMonth] = monthKey.split('-').map(Number);
  const monthNamesUa = ['','січень','лютого','березня','квітня','травня','червня','липня','серпня','вересня','жовтня','листопада','грудня'];
  const monthNamesUa2 = ['','січні','лютому','березні','квітні','травні','червні','липні','серпні','вересні','жовтні','листопаді','грудні'];
  const curMonthStr = monthNamesUa[mMonth];   // e.g. "березня"
  const curMonthStr2 = monthNamesUa2[mMonth]; // e.g. "березні"

  // prevMonth: місяць ЗП = місяць виплати - 1
  const prevMonth = mMonth === 1 ? 12 : mMonth - 1;
  const prevMonthStr  = monthNamesUa[prevMonth];
  const prevMonthStr2 = monthNamesUa2[prevMonth];

  function isDueThisMonth(cellVal) {
    if (!cellVal) return false;
    const s = String(cellVal).toLowerCase().trim();
    if (s === 'nan' || s === '' || s.includes('не платити') || s.includes('звільни')) return false;
    // Text: "зарплата березня" — пряма назва місяця ЗП
    if (s.includes(curMonthStr) || s.includes(curMonthStr2)) return true;
    // Text: "треба заплатити у [місяць]" — місяць виплати = curMonth+1, тому ЗП = curMonth
    const nextMonth = mMonth === 12 ? 1 : mMonth + 1;
    const nextMonthStr  = monthNamesUa[nextMonth];
    const nextMonthStr2 = monthNamesUa2[nextMonth];
    if ((s.includes('треба') || s.includes('заплатити')) && (s.includes(nextMonthStr) || s.includes(nextMonthStr2))) return true;
    // Date format: дата виплати 27.MM → ЗП місяця MM-1
    const dateMatch = s.match(/(\d{1,2})\.(\d{1,2})(?:\.(\d{4}))?/);
    if (dateMatch) {
      const payMonth = parseInt(dateMatch[2]);
      const payYear  = dateMatch[3] ? parseInt(dateMatch[3]) : mYear;
      // Місяць виплати = mMonth+1, ЗП = mMonth
      const expectedPayMonth = mMonth === 12 ? 1 : mMonth + 1;
      if (payMonth === expectedPayMonth && payYear === mYear) return true;
    }
    return false;
  }

  if (fileData.drug) {
    const wsDrug = fileData.drug.Sheets[fileData.drug.SheetNames[0]];
    if (wsDrug) {
      const range = XLSX.utils.decode_range(wsDrug['!ref']);
      for (let r = 0; r <= range.e.r; r++) {
        const whoName = cleanName(gc(wsDrug, r, 1)); // col B = who gets paid
        if (!whoName || whoName.length < 3) continue;
        // Check cols J (9) and K (10) for payment due this month
        const colJ = gc(wsDrug, r, 9);
        const colK = gc(wsDrug, r, 10);
        const colL = gc(wsDrug, r, 11);
        // Skip if "не платити" or "звільни" anywhere
        const allText = [colJ, colK, colL].map(v => String(v||'').toLowerCase()).join(' ');
        if (allText.includes('не платити') && !allText.includes(curMonthStr)) continue;
        let due = false;
        if (isDueThisMonth(colJ)) due = true;
        if (isDueThisMonth(colK)) due = true;
        if (due) {
          if (!drugMap[whoName]) drugMap[whoName] = 0;
          drugMap[whoName] += 1000;
        }
      }
    }
  }

  // === STEP 8: Parse табель (hours per person) ===
  txt.textContent = 'Читаємо табель...'; fill.style.width = '55%';
  const tabMap = {}; // name -> {hod, norma, vidpusk, likar}
  let globalNorma = 168; // norma for this month from табель
  const tabSheets = fileData.tab.SheetNames;
  tabSheets.forEach(shName => {
    const ws = fileData.tab.Sheets[shName];
    if (!ws) return;
    const range = XLSX.utils.decode_range(ws['!ref'] || 'A1:A1');
    // Find norma from row 2-3
    let normaVal = 168;
    for (let r = 0; r <= 5; r++) {
      for (let c = 0; c <= 5; c++) {
        const v = sfv(gc(ws, r, c));
        if (v >= 100 && v <= 250) { normaVal = v; globalNorma = v; break; }
      }
    }
    // Find data rows (row >= 7)
    for (let r = 6; r <= range.e.r; r++) {
      const nameRaw = String(gc(ws, r, 1) || '');
      if (!nameRaw || nameRaw.length < 3) continue;
      const name = cleanName(nameRaw);
      if (!name || name.length < 3) continue;
      let hod = sfv(gc(ws, r, 35));
      const vidpusk = sfv(gc(ws, r, 37));
      const likar = sfv(gc(ws, r, 38));
      // Горбач Олександр: табель записує дні (1) замість годин — множимо на 8
      if (name.includes('Горбач') && name.includes('Олександр')) hod = hod * 8;
      // Always record if person is in tabель (even hod=0 means they were present but didn't work)
      if (nameRaw && nameRaw.length > 2) {
        tabMap[name] = {hod, norma: normaVal, vidpusk, likar};
      }
    }
  });

  // Read lvivSales and lvivPdv from тонаж
  let lvivPdv = 0;
  if (wsTonn) {
    const rangeSales = XLSX.utils.decode_range(wsTonn['!ref']);
    for (let r = 0; r <= rangeSales.e.r; r++) {
      const lbl = String(gc(wsTonn,r,1)||gc(wsTonn,r,0)||'').toLowerCase();
      if (lbl.includes('продаж') && !lbl.includes('пдв')) {
        lvivSales = sfv(gc(wsTonn,r,2)) || sfv(gc(wsTonn,r,1));
        if (lbl === String(gc(wsTonn,r,1)||'').toLowerCase()) lvivSales = sfv(gc(wsTonn,r,2));
      }
      if (lbl.includes('пдв') || lbl.includes('повернення пдв')) {
        lvivPdv = sfv(gc(wsTonn,r,2)) || sfv(gc(wsTonn,r,1));
        if (String(gc(wsTonn,r,1)||'').toLowerCase().includes('пдв')) lvivPdv = sfv(gc(wsTonn,r,2));
      }
    }
  }

  // === STEP 9: Build employees from existing base data + new calculations ===
  txt.textContent = 'Розраховуємо ЗП...'; fill.style.width = '70%';

  // Use previous month as base, but skip people who are truly absent
  // (not in нараховано AND not in табель = звільнені або не працюють)
  // Always use April as base - it has correct lviv/lutsk/rожище flags hardcoded
  // Other months may have lost flags due to save/reload cycle
  const MASTER_BASE_KEY = '2026-04';
  const masterBase = HISTORY[MASTER_BASE_KEY];
  const prevEmps = (masterBase && masterBase.employees && masterBase.employees.length > 0)
    ? masterBase.employees
    : (Object.keys(HISTORY).sort()
        .map(k => HISTORY[k])
        .find(h => h && h.employees && h.employees.length > 0) || {employees:[]}).employees;

  const baseEmps = prevEmps.filter(e => {
    const KNOWN_DEPTS = ['Виробництво','Керівники цехів','Цех цукерок','Цех вафель','Цех глазурі','Логістика','Технічний відділ','Охорона','Львів','Луцьк'];
    if (!KNOWN_DEPTS.includes(e.dept)) return false;
    // Include if: has f1 this month OR has hours in табель OR has доплати
    const hasF1  = matchName(e.name, f1Map)      !== null;
    const hasTab = matchName(e.name, tabMap)     !== null;
    const hasDop = matchName(e.name, doplatyMap) !== null;
    const hasVidp= matchName(e.name, vidpuskMap) !== null;
    const isRozhyshche = e.rожище === true;
    const isLviv = e.lviv === true;
    const isLutsk = e.lutsk === true;
    return hasF1 || hasTab || hasDop || hasVidp || isRozhyshche || isLviv || isLutsk;
  });

  const allEmps = baseEmps.map(base => {
    const name = base.name;
    
    // Поворотна премія: іде в Ф1, але повернуті податки (23%) йдуть в Ф2
    const povor = base.lviv_fop_fixed ? 0 : (matchName(name, povorMap) || 0);
    const povor_tax_refund = Math.round(povor * 0.23 * 100) / 100;

    // Get Ф1 (+ поворотна премія) — ФОП fixed люди не мають Ф1
    const f1_base = base.lviv_fop_fixed ? 0 : (matchName(name, f1Map) || 0);
    const f1 = Math.round((f1_base + povor) * 100) / 100;
    const taxes = Math.round(f1 * 0.23 * 100) / 100;
    const kartu = Math.round((f1 - taxes) * 100) / 100;

    // Get hours from табель
    const tabRaw = matchName(name, tabMap);
    const baseNorma = base.norma || 168;
    // If not in tabель but has f1 (worked full month) → use norma as hod
    const f1ForCheck = matchName(name, f1Map) || 0;
    // For lviv people: if hod=0 in табель → use globalNorma (fixed salary)
    // For others: if hod=0 in табель → respect the 0 (genuinely absent)
    // If not in табель at all → fallback
    let tab;
    if (tabRaw) {
      if ((base.lviv || base.lutsk) && tabRaw.hod === 0 && tabRaw.vidpusk === 0 && tabRaw.likar === 0) {
        tab = {hod: globalNorma, norma: globalNorma, vidpusk: 0, likar: 0};
      } else {
        tab = tabRaw;
      }
    } else {
      const fallbackHod = (base.lviv || base.lutsk || f1ForCheck > 0) ? globalNorma : 0;
      tab = {hod: fallbackHod, norma: globalNorma, vidpusk: 0, likar: 0};
    }
    const hod = tab.hod;
    const norma = tab.norma || baseNorma;
    // normaEff is defined below but we need it here too for pct_normy
    // so we recalculate inline
    const _normaEff = name.includes("Качковськ") ? 136
      : (base.dept === "Охорона" && !name.includes("Смоляк") && !name.includes("Фердолевськ")) ? 192
      : norma;
    const pct_normy = _normaEff > 0 ? Math.round(hod/_normaEff*100)/100 : 0;

    // Calculate ставка
    const oklad_obr = base.oklad_obr || base.oklad || 0;
    // Для відділів з премією за норму — ставка обмежена нормою, надурочні = окрема премія
    const PREM_NORMA_DEPTS = ['Виробництво','Цех цукерок','Цех вафель','Цех глазурі'];
    // Виключення: Павлюк не має премії за норму годин
    const NO_PREM_NORMA = ['Павлюк'];
    const isPremNormaDept = PREM_NORMA_DEPTS.includes(base.dept)
      && !NO_PREM_NORMA.some(n => name.includes(n));
    // Норма годин: Качковський — 136; Охорона (крім Смоляк і Фердолевської) — 192; решта — з табеля
    let normaEff;
    if (name.includes('Качковськ')) {
      normaEff = 136;
    } else if (base.dept === 'Охорона' && !name.includes('Смоляк') && !name.includes('Фердолевськ')) {
      normaEff = 192;
    } else {
      normaEff = norma;
    }
    // Львів/Луцьк: фіксований оклад, але якщо є години в табелі — рахуємо пропорційно
    let stavka;
    if (base.lviv || base.lutsk) {
      if (hod > 0) {
        stavka = Math.round((oklad_obr * hod / normaEff) * 100) / 100;
      } else {
        stavka = oklad_obr;
      }
    } else {
      const hodForStavka = isPremNormaDept ? Math.min(hod, normaEff) : hod;
      stavka = Math.round((oklad_obr * hodForStavka / normaEff) * 100) / 100;
    }

    // Премія за норму годин (якщо факт > норма)
    const hodDiff = hod - normaEff;
    const prem_norma = isPremNormaDept && hodDiff > 0
      ? Math.round(hodDiff * 110 * 100) / 100 : 0;

    // Get stazh
    const stazh_years = base.no_stazh ? 0 : (matchName(name, stazhMap) !== null ? matchName(name, stazhMap) : (base.stazh_years || 0));
    const stazh_prem = Math.round(stazh_years) * 150;

    // Get відпускні та лікарняні ФСС
    const vidpusk = matchName(name, vidpuskMap) || 0;
    const likar_fss_from_file = matchName(name, likarFssMap) || 0;

    // Get доплати
    const dopList = matchName(name, doplatyMap) || [];
    // Левицька - додаткові доплати з окремого аркуша
    if (name.includes('Левицька')) {
      const levExtra = levytskaMap['Левицька'] || 0;
      if (levExtra !== 0) dopList.push({amt: levExtra, desc: 'Додаткові доплати'});
    }
    let mob = 0, sumish = 0, inше = 0;
    dopList.forEach(d => {
      const desc = d.desc.toLowerCase();
      if (desc.includes('моб')) mob += d.amt;
      else if (desc.includes('суміщ') || desc.includes('сумісн')) {
        // Доплата за суміщення рахується пропорційно: base/norma*hod
        sumish += Math.round(d.amt / norma * hod * 100) / 100;
      }
      else inше += d.amt;
    });

    // Фіксовані доплати за моб. зв'язок (не залежать від файлу)
    const FIXED_MOB = {
      'Динісова': 200, 'Андрійчук Людмила': 100, 'Зінчук Тетяна Миколаївна': 100,
      'Симонович': 100, 'Новак Олександр': 100, 'Сачковський': 100, 'Третяк': 100, 'Романюк Наталія': 100
    };
    for (const [key, amt] of Object.entries(FIXED_MOB)) {
      if (name.includes(key)) { mob = amt; break; }
    }

    // Фіксовані доплати за суміщення посад (база для пропорційного розрахунку)
    const FIXED_SUMISH = { 'Андрійчук Людмила': 3000 };
    for (const [key, base] of Object.entries(FIXED_SUMISH)) {
      if (name.includes(key)) {
        sumish = Math.round(base / norma * hod * 100) / 100;
        break;
      }
    }

    // Премія за друга
    const drug = matchName(name, drugMap) || 0;
    if (drug > 0) inше += drug;
    // Save drug separately for display
    const drugAmt = drug;

    // Керівники цехів - розраховуємо премії по таблиці ставок
    let prem_tonazh = 0, prem_plan = 0, plan_t = undefined, fakt_t = undefined, pct_plan = undefined;
    if (base.dept === 'Керівники цехів') {
      if (name.includes('Романюк')) {
        const pCila = vPctCila;
        prem_tonazh = pCila<88?0 : pCila<90?1500 : pCila<92?2000 : 2500;
        const vPlanPct = vPlan>0 ? vFakt/vPlan : 0;
        prem_plan = vPlanPct<1.0?0 : vPlanPct<1.10?1000 : 2000;
        plan_t=vPlan; fakt_t=vFakt; pct_plan=vPlanPct;
      } else {
        const fTon = tFakt;
        if (name.includes('Динісова')) {
          prem_tonazh = fTon<85?0 : fTon<110?3000 : fTon<120?4000 : fTon<130?5000 : fTon<140?6000 : 7000;
          prem_plan   = tPct<1.0?0 : tPct<1.10?2000 : 4000;
        } else if (name.includes('Андрійчук')) {
          prem_tonazh = fTon<85?0 : fTon<110?500 : fTon<120?1000 : fTon<130?1500 : fTon<140?2000 : 2500;
          prem_plan   = tPct<1.0?0 : tPct<1.10?500 : 1000;
        } else {
          // Волох, Курдельчук, Шатковська
          prem_tonazh = fTon<85?0 : fTon<110?2000 : fTon<120?3000 : fTon<130?4000 : fTon<140?5000 : 6000;
          prem_plan   = tPct<1.0?0 : tPct<1.10?1500 : 3000;
        }
        plan_t=tPlan; fakt_t=tFakt; pct_plan=tPct;
      }
    }

    // Охорона — премії
    let emp_prem_norma = prem_norma; // вже розрахована для цехів
    let emp_prem_vyyavl = 0;
    if (base.dept === 'Охорона') {
      const okh = matchName(name, okhorMap);
      if (okh) {
        emp_prem_norma = okh.prem_norma;
        emp_prem_vyyavl = okh.prem_vyyavl;
      }
    }

    // Нараховано ЗП = ставка + стаж + відпускні + доплати + премії
    const totalLikar = (tab.likar||0) + likar_fss_from_file;
    // Львів спеціальні розрахунки
    let lviv_sales = 0;
    if (base.lviv_sales_pct && lvivSales > 0) {
      lviv_sales = Math.round(base.lviv_sales_pct * lvivSales * 100) / 100;
    }
    const lviv_fop_dopl = base.lviv_fop_dopl || 0;
    const lviv_fop_pct_bonus = base.lviv_fop_pct ? Math.round(oklad_obr * base.lviv_fop_pct * 100) / 100 : 0;
    const lviv_shokobum = base.lviv_shokobum || 0;
    // Луцьк специфічні доплати
    const lutsk_sumish = base.lutsk_sumish_fixed ? Math.round(base.lutsk_sumish_fixed / normaEff * hod * 100) / 100 : 0;
    const lutsk_pryb = base.lutsk_pryb_fixed ? Math.round(base.lutsk_pryb_fixed / normaEff * hod * 100) / 100 : 0;
    const lutsk_pdv = (base.lutsk_pdv_pct && lvivPdv > 0) ? Math.round(base.lutsk_pdv_pct * lvivPdv * 100) / 100 : 0;

    let nar_zp;
    if (base.lviv_fop_fixed) {
      nar_zp = base.lviv_fop_fixed;
    } else {
      nar_zp = Math.round((stavka + stazh_prem + vidpusk + mob + sumish + inше + prem_tonazh + prem_plan + emp_prem_norma + emp_prem_vyyavl + totalLikar + lviv_sales + lviv_fop_dopl + lviv_fop_pct_bonus + lviv_shokobum + lutsk_sumish + lutsk_pryb + lutsk_pdv) * 100) / 100;
    }
    // Гнинюк: гарантовано 20000 на руки → f2 = target - kartu
    // (handled in f2 calc below)

    // Ф2 = нарах. ЗП - f1_full + відшкодування податків
    let f2;
    if (base.rожище) {
      // Рожище: фіксовано f2=2200
      f2 = 2200;
    } else if (base.lviv_fop_fixed) {
      // ФОП фіксована сума: f2 = фіксована сума
      f2 = base.lviv_fop_fixed;
    } else if (base.lutsk_f1_base) {
      // Деміш: стандартна f2, але якщо f1 > lutsk_f1_base → відшкодування тільки від різниці
      const f1_excess = Math.max(0, f1_base - base.lutsk_f1_base);
      const demish_refund = Math.round(f1_excess * 0.23 * 100) / 100;
      f2 = Math.round((nar_zp - f1_base + demish_refund) * 100) / 100;
    } else if (base.lutsk_target_hands) {
      // Гнинюк: гарантовано 20000 + стаж на руки = kartu + f2
      const target = base.lutsk_target_hands + stazh_prem;
      const kartu_tmp = Math.round(f1_base * 0.77 * 100) / 100;
      f2 = Math.round((target - kartu_tmp) * 100) / 100;
    } else if (base.lviv_povor_f1) {
      if (name.includes('Тимочко Орест')) {
        // Тимочко: повертає різницю між карткою і реальною ЗП
        // f2 = nar_zp - kartu (від'ємне = повернення)
        const kartu_tmp = Math.round((f1_base + povor) * 0.77 * 100) / 100;
        f2 = Math.round((nar_zp - kartu_tmp) * 100) / 100;
      } else {
        // Монастирська: відшкодовуємо 23% з Ф1 завжди
        const lviv_tax_refund = Math.round(f1_base * 0.23 * 100) / 100;
        f2 = Math.round((nar_zp - f1_base + lviv_tax_refund) * 100) / 100;
      }
    } else {
      f2 = Math.round((nar_zp - f1_base - povor + povor_tax_refund) * 100) / 100;
    }

    const emp = {
      name: base.name,
      dept: base.dept,
      posada: base.posada,
      oform: base.oform || '',
      oklad: base.oklad,
      oklad_obr: oklad_obr,
      hod, norma: _normaEff, pct_normy,
      stavka,
      stazh_years, stazh_prem,
      vidpusk: vidpusk + (tab.vidpusk||0),
      likar_fss: likar_fss_from_file + (tab.likar||0),
      mob, sumish, inше,
      nar_zp, f1, taxes, kartu,
      zagalna: nar_zp,
      f2,
      avans: 0,
      do_vypl: f2,
    };

    // Preserve location flags so they survive save/reload cycle
    if (base.lviv) emp.lviv = true;
    if (base.lutsk) emp.lutsk = true;
    if (base.rожище) emp.rожище = true;
    if (base.lviv_fop_fixed) emp.lviv_fop_fixed = true;

    // Save поворотна премія
    if (povor > 0) emp.povor = povor;

    // Save individual доплати for display
    if (drugAmt > 0) emp.drug = drugAmt;
    if (lutsk_sumish > 0) emp.lutsk_sumish = lutsk_sumish;
    if (lutsk_pryb > 0) emp.lutsk_pryb = lutsk_pryb;
    if (lutsk_pdv > 0) emp.lutsk_pdv = lutsk_pdv;
    if (base.lviv_shokobum) emp.lviv_shokobum = base.lviv_shokobum;
    if (lviv_sales > 0) emp.lviv_sales = lviv_sales;
    if (lviv_fop_pct_bonus > 0) emp.lviv_fop_pct_bonus = lviv_fop_pct_bonus;
    if (lviv_fop_dopl > 0) emp.lviv_fop_dopl = lviv_fop_dopl;
    emp.dopList = dopList.map(function(d) {
      return {amt: d.amt, desc: d.desc};
    });

    // Always set prem_norma
    emp.prem_norma = emp_prem_norma;
    if (emp_prem_vyyavl) emp.prem_vyyavl = emp_prem_vyyavl;

    if (prem_tonazh !== undefined) {
      emp.prem_tonazh = prem_tonazh;
      emp.prem_plan = prem_plan;
      emp.plan_t = plan_t;
      emp.fakt_t = fakt_t;
      emp.pct_plan = pct_plan;
    } else if (tPlan > 0) {
      // For цех цукерок workers - use global тонаж data (no individual premium, just info)
      emp.plan_t = tPlan;
      emp.fakt_t = tFakt;
      emp.pct_plan = tPct;
    }

    return emp;
  });

  fill.style.width = '90%';
  txt.textContent = 'Збереження...';

  const [year, month] = monthKey.split('-');
  const monthNames = ['','Січень','Лютий','Березень','Квітень','Травень','Червень','Липень','Серпень','Вересень','Жовтень','Листопад','Грудень'];
  const label = monthNames[parseInt(month)] + ' ' + year;

  HISTORY[monthKey] = {label, employees: allEmps, tPlan, tFakt};

  setTimeout(() => {
    buildMonthSelector();
    setMonth(monthKey);
    closeUpload();
    // Reset file data
    fileData = {dany:null, tab:null, stazh:null, drug:null};
    $('importBtn').disabled = true;
    showToast('✓ '+label+' розраховано. '+allEmps.length+' працівників.', 'ok');
    $('progress').style.display = 'none';
    fill.style.width = '0%';
  }, 600);
}

function updateAvans(name, val) {
  const avans = parseFloat(val) || 0;
  // Find in current month data
  const emps = HISTORY[currentMonth] ? HISTORY[currentMonth].employees : [];
  const emp = emps.find(e => e.name === name);
  if (!emp) return;
  emp.avans = avans;
  // Recalc do_vypl
  emp.do_vypl = Math.round((emp.f2 - avans) * 100) / 100;
  // Re-render card
  showCard(emp);
}

let zvShowing = false;

function toggleZvedena() {
  zvShowing = !zvShowing;
  const btn = $('btnZvedena');
  if (zvShowing) {
    btn.classList.add('active');
    $('empty').style.display='none';
    $('cv').style.display='none';
    $('lv').style.display='none';
    $('zv').style.display='';
    $('rc').textContent='';
    // Reset dept filter visually but keep data
    dept = '';
    $('ds').value = '';
    hideDrop();
    renderZvedena();
  } else {
    btn.classList.remove('active');
    $('zv').style.display='none';
    showEmpty();
  }
}

function renderZvedena() {
  const emps = HISTORY[currentMonth] ? HISTORY[currentMonth].employees : [];
  const label = HISTORY[currentMonth] ? HISTORY[currentMonth].label : '';
  if (!emps.length) { $('zv').innerHTML = '<p style="padding:2rem;color:var(--tx3)">Немає даних для цього місяця</p>'; return; }

  const depts = currentLocation==='kolky' ? KOLKY_DEPTS : currentLocation==='lviv' ? LVIV_DEPTS : LUTSK_DEPTS;
  const fmt = n => n ? Math.round(n).toLocaleString('uk-UA') + ' ₴' : '—';
  const fmtH = n => n ? parseFloat(n.toFixed(1)).toLocaleString('uk-UA') : '—';

  let totHod = 0, totF1 = 0, totF2 = 0, totKartu = 0, totTaxes = 0, totNar = 0, totGotivka = 0;

  const rows = depts.map((d, idx) => {
    const de = emps.filter(e => e.dept === d);
    if (!de.length) return '';
    const hod = de.reduce((s,e) => s+(e.hod||0), 0);
    const f1 = de.reduce((s,e) => s+(e.f1||0), 0);
    const nar = de.reduce((s,e) => s+(e.nar_zp||0), 0);
    const taxes = de.reduce((s,e) => s+(e.taxes||0), 0);
    const kartu = de.reduce((s,e) => s+(e.kartu||0), 0);
    const f2 = de.reduce((s,e) => s+(e.f2||0), 0);
    const gotivka = de.reduce((s,e) => {
      const dv = (e.do_vypl !== undefined && (e.do_vypl !== 0 || e.avans > 0)) ? e.do_vypl : (e.f2||0);
      return s + (dv > 0 ? dv : 0); // тільки ті хто отримує, без повернень
    }, 0);
    const fop = f1 + f2;
    totHod += hod; totF1 += f1; totF2 += f2; totKartu += kartu; totTaxes += taxes; totNar += nar; totGotivka += gotivka;
    return `<tr style="cursor:pointer" onclick="dept='${d}';$('ds').value='${d}';zvShowing=false;$('btnZvedena').classList.remove('active');$('zv').style.display='none';showList('${d}')">
      <td>${idx+1}</td>
      <td>${d} <span style="font-size:11px;color:var(--tx3);font-weight:400">(${de.length} ос.)</span></td>
      <td>${fmtH(hod)}</td>
      <td class="zv-f1">${Math.round(f1).toLocaleString('uk-UA')} ₴</td>
      <td class="zv-f2">${Math.round(f2).toLocaleString('uk-UA')} ₴</td>
      <td>${Math.round(fop).toLocaleString('uk-UA')} ₴</td>
      <td>${Math.round(kartu).toLocaleString('uk-UA')} ₴</td>
      <td style="color:var(--rd)">${Math.round(taxes).toLocaleString('uk-UA')} ₴</td>
      <td style="color:var(--bl)">${Math.round(nar).toLocaleString('uk-UA')} ₴</td>
      
    </tr>`;
  }).join('');

  const totFop = totF1 + totF2;

  $('zv').innerHTML = `
    <div class="zv-card">
      <div class="zv-header">
        <h2>Зведена відомість розрахунку ЗП</h2>
        <p>ТзОВ ТВК "ВОЛДІ" · ЄДРПОУ 31475712 · ${label} · ${emps.length} працівників</p>
      </div>
      <div class="zv-summary">

// ===== NOTES & APPROVAL =====
const DIRECTOR_PASS = '1975';

function getNotes() {
  try { return JSON.parse(localStorage.getItem('zp_notes') || '{}'); } catch(e) { return {}; }
}
function saveNotes(data) {
  try { localStorage.setItem('zp_notes', JSON.stringify(data)); } catch(e) {}
}
function getNoteData(month, key, field) {
  const n = getNotes();
  return (n[month] && n[month][key] && n[month][key][field]) || '';
}

function saveNote(key, value) {
  const n = getNotes();
  if (!n[currentMonth]) n[currentMonth] = {};
  if (!n[currentMonth][key]) n[currentMonth][key] = {};
  n[currentMonth][key].text = value;
  saveNotes(n);
}

function buildApprovalBtn(month, key) {
  const approved = getNoteData(month, key, 'approved');
  const approvedBy = getNoteData(month, key, 'approvedBy');
  const approvedAt = getNoteData(month, key, 'approvedAt');
  if (approved) {
    return '<span class="approval-stamp">✅ Погоджено · '+approvedBy+' · '+approvedAt+'</span>'
      +'<button class="btn-unapprove" onclick="unapprove(\'' + key + '\')">Скасувати</button>';
  }
  return '<button class="btn-approve" onclick="approveAction(\'' + key + '\')">✓ Погодити</button>'
    +'<span class="approval-stamp empty" id="stamp_'+key+'">не погоджено</span>';
}

function approveAction(key) {
  const pass = prompt('Введіть пароль директора:');
  if (pass !== DIRECTOR_PASS) { alert('Невірний пароль'); return; }
  const name = prompt('Ваше ім\'я (для підпису):') || 'Директор';
  const now = new Date();
  const dateStr = now.toLocaleDateString('uk-UA') + ' ' + now.toLocaleTimeString('uk-UA', {hour:'2-digit',minute:'2-digit'});
  const n = getNotes();
  if (!n[currentMonth]) n[currentMonth] = {};
  if (!n[currentMonth][key]) n[currentMonth][key] = {};
  n[currentMonth][key].approved = true;
  n[currentMonth][key].approvedBy = name;
  n[currentMonth][key].approvedAt = dateStr;
  saveNotes(n);
  renderZvedena();
}

function unapprove(key) {
  const pass = prompt('Введіть пароль директора для скасування:');
  if (pass !== DIRECTOR_PASS) { alert('Невірний пароль'); return; }
  const n = getNotes();
  if (n[currentMonth] && n[currentMonth][key]) {
    delete n[currentMonth][key].approved;
    delete n[currentMonth][key].approvedBy;
    delete n[currentMonth][key].approvedAt;
  }
  saveNotes(n);
  renderZvedena();
}

function saveDeptNote(dept, value) {
  saveNote('dept_'+dept, value);
}


init();

// ===== GITHUB SYNC =====
let GH_TOKEN = localStorage.getItem('gh_token') || '';
const GH_USER = 'voldizp';
const GH_REPO = 'voldi-zp';
const GH_FILE = 'data.json';
const GH_API = 'https://api.github.com/repos/' + GH_USER + '/' + GH_REPO + '/contents/' + GH_FILE;

function setupGhToken() {
  const t = prompt('GitHub token:');
  if (t) { localStorage.setItem('gh_token', t); GH_TOKEN = t; }
}

async function loadFromGithub() {
  try {
    const rawUrl = 'https://raw.githubusercontent.com/' + GH_USER + '/' + GH_REPO + '/main/' + GH_FILE + '?t=' + Date.now();
    const r = await fetch(rawUrl);
    if (!r.ok) return false;
    const data = await r.json();
    const ghMonths = data.months || {};
    Object.keys(ghMonths).forEach(k => {
      const ghEmps = (ghMonths[k].employees || []).length;
      const localEmps = ((HISTORY[k] || {}).employees || []).length;
      if (ghEmps > 0) HISTORY[k] = ghMonths[k]; // always prefer GitHub data
    });
    if (data.currentMonth) currentMonth = data.currentMonth;
    showToast('Дані завантажено ✓', 'ok');
    setTimeout(() => { try { buildMonthSelector(); } catch(e) {} try { setMonth(currentMonth); } catch(e) {} }, 200);
    return true;
  } catch(e) { console.error('GitHub load error:', e); return false; }
}

async function saveToGithub() {
  try {
    const empCount = HISTORY[currentMonth] && HISTORY[currentMonth].employees ? HISTORY[currentMonth].employees.length : 0;
    if (empCount === 0) { showToast('Немає даних!', 'err'); return; }
    showToast('Збереження ' + empCount + ' працівників...', '');
    console.log('Saving:', currentMonth, 'employees:', empCount, 'months:', Object.keys(HISTORY));
    let sha = '';
    try {
      const r = await fetch(GH_API, {headers: {'Authorization': 'token ' + GH_TOKEN}});
      if (r.ok) { const j = await r.json(); sha = j.sha; }
    } catch(e) {}
    const data = { months: HISTORY, currentMonth };
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
    const body = { message: 'Update ' + currentMonth, content, ...(sha ? {sha} : {}) };
    const r = await fetch(GH_API, {
      method: 'PUT',
      headers: {'Authorization': 'token ' + GH_TOKEN, 'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    });
    if (r.ok) { showToast('Збережено ✓', 'ok'); }
    else { const err = await r.json(); showToast('Помилка: ' + (err.message || r.status), 'err'); }
  } catch(e) { showToast('Помилка: ' + e.message, 'err'); }
}

loadFromGithub();

</script>
